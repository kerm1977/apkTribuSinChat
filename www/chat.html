<!-- Vista: chat.html -->
<!-- Este archivo contiene únicamente la estructura visual del modal -->
<div class="modal fade" id="modalChat" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <style>
        /* Alturas optimizadas para la navegación interna */
        #chat-contacts { height: calc(65vh - 50px); overflow-y: auto; background-color: #fff; }
        
        /* 🔥 SOLUCIÓN: Asegurar que el chat-window tenga flex-basis y no colapse */
        #chat-window { 
            height: 55vh; 
            overflow-y: auto; 
            background-color: #f0f2f5; 
            flex: 1 1 auto !important; 
        }
        
        /* Ajustes para el Menú Desplegable Invertido (Dropup) y Picker */
        .dropdown-menu { z-index: 1060; }
        #emoji-picker { scrollbar-width: none; /* Oculta barra en firefox */ }
        #emoji-picker::-webkit-scrollbar { display: none; /* Oculta barra en Chrome/Safari */ }
    </style>
    
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
        <div class="modal-content rounded-t-4 border-0 shadow-lg">
            
            <!-- Cabecera del Modal -->
            <div class="modal-header bg-primary text-white border-0 py-3">
                <div class="d-flex align-items-center w-100">
                    <!-- Botón Volver (Se muestra al entrar a un chat privado) -->
                    <button class="btn btn-sm text-white border-0 me-2 d-none" id="btn-chat-volver" onclick="window.volverAContactos()">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </button>

                    <div class="bg-white bg-opacity-25 rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px;">
                        <i class="bi bi-chat-fill"></i>
                    </div>
                    
                    <h5 class="modal-title fw-bold mb-0 text-truncate flex-grow-1" id="chat-title" style="max-width: 60vw;">Mensajes</h5>

                    <!-- MENÚ DE OPCIONES (Tres puntitos) -->
                    <div class="dropdown d-none" id="chat-options-btn">
                        <button class="btn text-white border-0 p-0 me-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-three-dots-vertical fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm rounded-3">
                            <li><a class="dropdown-item py-2 text-primary" href="#" onclick="window.exportarTXT()"><i class="bi bi-download me-2"></i> Exportar a TXT</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item py-2 text-danger fw-bold" href="#" onclick="window.limpiarChat()"><i class="bi bi-trash3-fill me-2"></i> Vaciar Chat</a></li>
                        </ul>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar" onclick="window.cerrarChatGlobal()"></button>
            </div>
            
            <div class="modal-body p-0 position-relative">

                <!-- PANTALLA 1: LISTA DE CONTACTOS -->
                <div id="vista-contactos" class="d-block">
                    <!-- Buscador en Vivo -->
                    <div class="p-2 bg-light border-bottom shadow-sm">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 rounded-start-pill text-muted"><i class="bi bi-search"></i></span>
                            <input type="text" id="buscador-input" class="form-control border-start-0 rounded-end-pill shadow-none" placeholder="Buscar compañero..." onkeyup="window.filtrarBuscador()">
                        </div>
                    </div>

                    <!-- Contenedor de la lista de compañeros -->
                    <div id="chat-contacts" class="list-group list-group-flush">
                        <div class="text-center py-5 text-muted small">
                            Cargando compañeros... <br>
                            <div class="spinner-border spinner-border-sm mt-2 text-primary"></div>
                        </div>
                    </div>
                </div>

                <!-- PANTALLA 2: CHAT PRIVADO -->
                <div id="vista-chat" class="d-none flex-column h-100">
                    
                    <!-- Ventana de mensajes -->
                    <div id="chat-window" class="p-3 d-flex flex-column flex-grow-1">
                        <!-- Aquí inyecta chat.js los mensajes -->
                    </div>
                    
                    <!-- Barra de entrada de texto y adjuntos -->
                    <div class="p-3 border-top bg-white position-relative" style="flex-shrink: 0;">
                        
                        <!-- CONTENEDOR EMOJIS (Oculto por defecto, flota arriba del input) -->
                        <div id="emoji-picker" class="position-absolute bg-white border rounded-4 shadow p-3 d-none" style="bottom: 75px; left: 10px; width: 280px; max-height: 220px; overflow-y: auto; z-index: 1070; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;">
                            <!-- Emojis inyectados dinámicamente vía JS -->
                        </div>

                        <div class="input-group gap-2 align-items-end">
                            
                            <!-- Botón Emojis -->
                            <button class="btn btn-light border-0 rounded-circle text-secondary fs-5 p-0 m-0 d-flex justify-content-center align-items-center shadow-none" style="width: 45px; height: 45px; flex-shrink: 0;" onclick="window.toggleEmojiPicker()">
                                <i class="bi bi-emoji-smile"></i>
                            </button>

                            <!-- Menú de Adjuntos (Dropup Moderno) -->
                            <div class="dropdown dropup" style="flex-shrink: 0;">
                                <button class="btn btn-light border-0 rounded-circle d-flex align-items-center justify-content-center m-0 shadow-none" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="width: 45px; height: 45px; transition: all 0.3s;" id="btn-adjunto-menu">
                                    <i class="bi bi-paperclip fs-5"></i>
                                </button>
                                
                                <ul class="dropdown-menu shadow-lg border-0 rounded-4 mb-2 p-2">
                                    <!-- Opción de Cámara (Usa puente nativo capture="environment") -->
                                    <li>
                                        <label for="chat-camera-input" class="dropdown-item py-2 rounded-3 mb-1" style="cursor:pointer;">
                                            <div class="d-flex align-items-center fw-bold">
                                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 35px; height: 35px;"><i class="bi bi-camera-fill"></i></div>
                                                Tomar Foto
                                            </div>
                                        </label>
                                    </li>
                                    <!-- Opción de Galería / GIFs -->
                                    <li>
                                        <label for="chat-file" class="dropdown-item py-2 rounded-3 mb-1" style="cursor:pointer;">
                                            <div class="d-flex align-items-center fw-bold">
                                                <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 35px; height: 35px;"><i class="bi bi-images"></i></div>
                                                Galería y GIFs
                                            </div>
                                        </label>
                                    </li>
                                    <li><hr class="dropdown-divider"></li>
                                    <!-- Opción de Ubicación GPS -->
                                    <li>
                                        <a class="dropdown-item py-2 rounded-3 fw-bold" href="#" onclick="window.enviarUbicacion()">
                                            <div class="d-flex align-items-center">
                                                <div class="bg-danger bg-opacity-10 text-danger rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 35px; height: 35px;"><i class="bi bi-geo-alt-fill"></i></div>
                                                Compartir Ubicación
                                            </div>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                            
                            <!-- Inputs Ocultos de Archivos -->
                            <input type="file" id="chat-file" class="d-none" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt,.gif,.webp" onchange="window.actualizarEstadoAdjunto(this)">
                            <input type="file" id="chat-camera-input" class="d-none" accept="image/*" capture="environment" onchange="window.actualizarEstadoAdjunto(this)">
                            
                            <!-- Campo de texto principal -->
                            <input type="text" id="chat-msg-input" class="form-control rounded-pill border-0 bg-light px-3 shadow-none" style="height: 45px;" placeholder="Mensaje..." autocomplete="off">
                            
                            <!-- Botón de envío principal -->
                            <button id="btn-enviar-msj" class="btn btn-primary rounded-circle shadow-sm d-flex align-items-center justify-content-center m-0" style="width: 45px; height: 45px; flex-shrink: 0;" onclick="window.enviarAccionChat()">
                                <i class="bi bi-send-fill"></i>
                            </button>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
